# External-plugin overlay.
#
# Bring up Daisy + every plugin in one command:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.plugins.yml \
#     --profile full \
#     up -d
#
# Plugin services pull pre-built images from Docker Hub:
#
#   vivek13186/daisy-plugin-jira
#   vivek13186/daisy-plugin-google-sheets
#   vivek13186/daisy-plugin-microsoft-teams
#   vivek13186/daisy-plugin-npm
#   vivek13186/daisy-plugin-aws-s3
#   vivek13186/daisy-plugin-s3
#
# Upgrades are `docker compose pull <svc> && docker compose up -d <svc>`.
# Pin a tag in the image string below (`:0.2.0`, `:latest`, etc.) to
# control which build runs.
#
# The local plugins-external/<plugin>/ folders stay in place for
# offline / SDK-development workflows; swap the `image:` line for a
# `build: { context: ./plugins-external/<plugin> }` block to run from
# source instead.
#
# Per-plugin profiles let you bring up only what you need:
#
#   docker compose -f docker-compose.yml -f docker-compose.plugins.yml \
#     --profile jira up -d
#
# Daisy itself doesn't auto-discover these containers — you have to
# install each one once via the admin UI (or `npm run install-plugin
# -- --endpoint http://<container-name>:8080`). After that the plugin
# row lives in DB and survives restarts; the worker picks it up at
# boot via registry.loadAll().
#
# Plugins share the same internal docker network as the backend; the
# install endpoint URL uses the container name, e.g.
# `http://daisy-jira:8080`.

services:
  # ── Jira plugin ────────────────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via the
  # `operation` input (issue.get / issue.create / issue.update / issue.delete
  # / issue.search / issue.comment.add / issue.transition / issue.transitions.list).
  #
  # Auth: workspace `generic` config (default name "jira") holding
  # host / email / apiToken. Create one on the Configurations page in the
  # Daisy UI before running any flows.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-jira:8080

  daisy-jira:
    profiles: ["jira", "full"]
    image: vivek13186/daisy-plugin-jira:latest
    container_name: daisy-jira
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7006:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Google Sheets plugin ───────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via
  # the `operation` input (sheet.get / sheet.append / sheet.update /
  # sheet.clear / sheet.delete-rows / spreadsheet.create / spreadsheet.get).
  #
  # Auth: workspace `generic` config (default name "google") with a
  # `credentialsJson` field holding the entire service-account JSON file
  # from Google Cloud Console. Share each target spreadsheet with the
  # service account's client_email (Editor for writes, Viewer for reads).
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-google-sheets:8080

  daisy-google-sheets:
    profiles: ["google-sheets", "full"]
    image: vivek13186/daisy-plugin-google-sheets:latest
    container_name: daisy-google-sheets
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7001:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Microsoft Teams plugin ─────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via
  # the `operation` input (team.list / channel.list / channel.create /
  # channel.message.send / channel.message.list / chat.list /
  # chat.message.send / chat.message.list).
  #
  # Auth: workspace `generic` config (default name "microsoft-teams")
  # with tenantId / clientId / clientSecret from an Azure AD (Entra)
  # app registration that has the appropriate Microsoft Graph
  # application permissions. See plugins-external/microsoft-teams/README.md
  # for the permission list and one-time setup.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-microsoft-teams:8080

  daisy-microsoft-teams:
    profiles: ["microsoft-teams", "full"]
    image: vivek13186/daisy-plugin-microsoft-teams:latest
    container_name: daisy-microsoft-teams
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7002:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── npm registry plugin ─────────────────────────────────────────────
  # One container, one Daisy node. Read-only operations against the
  # public npm registry (or a private mirror): package.info /
  # package.search / package.downloads. No auth needed for the public
  # registry; private registries take a Bearer token via the node's
  # `token` input or a workspace `generic` config.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-npm:8080

  daisy-npm:
    profiles: ["npm", "full"]
    image: vivek13186/daisy-plugin-npm:latest
    container_name: daisy-npm
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7003:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── AWS S3 plugin ───────────────────────────────────────────────────
  # One container, one Daisy node. The action is selected per-node via
  # the `operation` input across 15 operations covering AWS-specific
  # features:
  #   bucket.getAll / bucket.create / bucket.delete / bucket.search /
  #   bucket.location / file.getAll / file.head / file.upload /
  #   file.download / file.copy / file.delete / file.presignedUrl /
  #   folder.create / folder.getAll / folder.delete
  #
  # Brings AWS-specific knobs the generic `s3` plugin doesn't: storage
  # classes, server-side encryption (SSE-S3 / SSE-KMS), object tagging,
  # requester pays, presigned URLs, and region-derived endpoints.
  #
  # Auth: workspace `generic` config (default name "aws-s3") with
  # accessKeyId / secretAccessKey / region (+ optional sessionToken /
  # customEndpoint for VPC interface endpoints, Transfer Acceleration,
  # AWS GovCloud, AWS China regions).
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-aws-s3:8080

  daisy-aws-s3:
    profiles: ["aws-s3", "full"]
    image: vivek13186/daisy-plugin-aws-s3:latest
    container_name: daisy-aws-s3
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7004:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Generic S3-compatible plugin ────────────────────────────────────
  # One container, one Daisy node. Talks to anything that speaks the S3
  # API — Wasabi, MinIO, DigitalOcean Spaces, Cloudflare R2, Backblaze
  # B2, vanilla AWS S3, your own MinIO-on-Kubernetes, etc.
  #   bucket.getAll / bucket.create / bucket.delete / bucket.search /
  #   file.getAll / file.upload / file.download / file.copy /
  #   file.delete / folder.create / folder.getAll / folder.delete
  #
  # No AWS-specific extras — if you need storage classes, KMS, etc.,
  # use the `aws-s3` plugin instead.
  #
  # Auth: workspace `generic` config (default name "s3") with
  # endpoint / region / accessKeyId / secretAccessKey. Set
  # forcePathStyle: true for MinIO and most on-prem setups.
  #
  # After `up -d`:
  #   npm run install-plugin -- --endpoint http://daisy-s3:8080

  daisy-s3:
    profiles: ["s3", "full"]
    image: vivek13186/daisy-plugin-s3:latest
    container_name: daisy-s3
    restart: unless-stopped
    environment:
      PORT: "8080"
    # Host port mapping (off by default — uncomment for local curl/browser).
    ports:
       - "7005:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
